name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...
      # golangci-lint omitted: its prebuilt binary lags the Go 1.26 target and
      # errors out. Run `make lint` locally. Re-add once a 1.26-built release exists.
